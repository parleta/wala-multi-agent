[pytest]
minversion = 7.0
addopts = 
    -ra 
    -q 
    --strict-markers
    --tb=short
    --timeout=30
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests that don't require network
    integration: Integration tests requiring XMPP server
    performance: Performance and load tests
    security: Security-focused tests
    slow: Tests that take more than 5 seconds
asyncio_mode = auto
timeout = 30
timeout_method = thread
log_cli = true
log_cli_level = INFO