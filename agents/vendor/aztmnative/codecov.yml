codecov:
  require_ci_to_pass: yes
  bot: "codecov-bot"

coverage:
  precision: 2
  round: down
  range: "70...100"
  
  status:
    project:
      default:
        target: 80%
        threshold: 1%
        base: auto
        if_not_found: success
        if_ci_failed: error
        only_pulls: false
    patch:
      default:
        target: 80%
        threshold: 1%
        base: auto
        if_not_found: success
        if_ci_failed: error
        only_pulls: false

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: no
  require_base: no
  require_head: no
  branches:
    - main
    - develop
    - Agentic

ignore:
  - "tests/**/*"
  - "setup.py"
  - "**/__pycache__/**/*"
  - "**/test_*.py"
  - "examples/**/*"
  - "docs/**/*"

flags:
  unittests:
    paths:
      - aztm/
    carryforward: true
  
  integration:
    paths:
      - aztm/
    carryforward: false