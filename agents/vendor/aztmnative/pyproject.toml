[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aztm"
version = "0.1.0"
description = "Agentic Zero Trust Mesh"
readme = "README.md"
authors = [{name = "Elad Rave", email = "eladrave@example.com"}]
license = {text = "MIT"}
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
keywords = ["http", "zero-trust", "mesh", "networking"]

dependencies = [
    "slixmpp>=1.8.0",
    "aiohttp>=3.8.0",  
    "requests>=2.28.0",
    "httpx>=0.24.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0", 
    "cryptography>=41.0.0",
    "python-jose[cryptography]>=3.3.0",
    "certifi>=2023.0.0",
    "prometheus-client>=0.17.0",
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
    "pydantic>=2.0.0",
    "click>=8.1.0",
    "aiofiles>=23.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "pytest-timeout>=2.1.0",
    "black>=23.0.0",
    "mypy>=1.5.0",
    "flake8>=6.1.0",
    "pre-commit>=3.4.0",
    "tox>=4.11.0",
    "build>=0.10.0",
    "twine>=4.0.0",
]
omemo = [
    "python-omemo>=0.1.0",
    "python-axolotl>=0.2.0",
]
all = [
    "aztm[dev,omemo]",
]

[project.urls]
Homepage = "https://github.com/eladrave/aztm"
Documentation = "https://github.com/eladrave/aztm/blob/main/README.md"
Repository = "https://github.com/eladrave/aztm"
Issues = "https://github.com/eladrave/aztm/issues"

[project.scripts]
aztm = "aztm.tools.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["aztm*"]
namespaces = false

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]
pythonpath = ["."]

[tool.coverage.run]
source = ["aztm"]
omit = ["*/tests/*", "*/test_*.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
    "raise AssertionError",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]