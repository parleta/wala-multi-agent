[tox]
envlist = py39,py310,py311,py312,lint,mypy
isolated_build = True

[testenv]
deps =
    -r requirements-dev.txt
commands =
    pytest {posargs:tests/}

[testenv:lint]
deps =
    black
    flake8
    isort
commands =
    black --check aztm tests
    flake8 aztm tests
    isort --check-only aztm tests

[testenv:mypy]
deps =
    mypy
    types-requests
    types-aiofiles
commands =
    mypy aztm

[testenv:coverage]
deps =
    -r requirements-dev.txt
commands =
    pytest --cov=aztm --cov-report=html --cov-report=term tests/

[testenv:docs]
deps =
    sphinx
    sphinx-rtd-theme
commands =
    sphinx-build -b html docs docs/_build