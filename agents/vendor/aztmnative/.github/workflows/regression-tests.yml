name: Regression Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run with debug logging'
        required: false
        default: false

env:
  AZTM_TEST_TIMEOUT: 600  # 10 minutes total timeout
  PYTHONDONTWRITEBYTECODE: 1
  PYTHONUNBUFFERED: 1

jobs:
  # Quick unit tests that don't require Docker
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-timeout pytest-xdist
      
      - name: Run unit tests with mocks
        run: |
          pytest tests/regression/test_*connectivity.py::TestMockedConnectivity \
                 tests/regression/test_mocked_*.py \
                 tests/unit/ \
                 -v \
                 --timeout=30 \
                 --tb=short \
                 --junit-xml=junit-unit-${{ matrix.python-version }}.xml \
                 --cov=aztm \
                 --cov-report=xml:coverage-unit-${{ matrix.python-version }}.xml \
                 --cov-report=term-missing \
                 -n auto \
                 -m "mock or not integration"
      
      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit-unit-*.xml
            coverage-unit-*.xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage-unit-${{ matrix.python-version }}.xml
          flags: unittests,python${{ matrix.python-version }}
          name: unit-py${{ matrix.python-version }}

  # Integration tests requiring Docker/XMPP server
  integration-tests:
    name: Integration Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']  # Reduced matrix for integration tests
        test-group: ['connectivity', 'transport', 'error-handling']
    
    services:
      # Try to use service container for Openfire
      openfire:
        image: quantumobject/docker-openfire:latest
        ports:
          - 5222:5222
          - 9090:9090
        options: >-
          --health-cmd "nc -z localhost 5222 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 60s
        env:
          DOMAIN: test.aztm
          ADMIN_PASSWORD: admin123
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-integration-${{ hashFiles('pyproject.toml') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install docker pytest-timeout pytest-xdist
      
      - name: Wait for XMPP server
        run: |
          echo "Waiting for Openfire to be ready..."
          for i in {1..60}; do
            if nc -z localhost 5222; then
              echo "Openfire is ready!"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 2
          done
          nc -z localhost 5222 || exit 1
      
      - name: Configure XMPP test users
        run: |
          # This would normally use Openfire API to create test users
          # For now, we'll skip if the API isn't available
          echo "Configuring test users..."
          # curl commands to create users via Openfire REST API would go here
      
      - name: Run integration tests - ${{ matrix.test-group }}
        env:
          AZTM_HOST: localhost
          AZTM_PORT: 5222
          AZTM_DOMAIN: test.aztm
          AZTM_LOG_LEVEL: DEBUG
          TEST_GROUP: ${{ matrix.test-group }}
        run: |
          case "$TEST_GROUP" in
            connectivity)
              TEST_PATTERN="tests/regression/test_basic_connectivity.py::TestBasicConnectivity"
              ;;
            transport)
              TEST_PATTERN="tests/regression/test_http_transport.py tests/regression/test_payload_sizes.py"
              ;;
            error-handling)
              TEST_PATTERN="tests/regression/test_error_handling.py"
              ;;
          esac
          
          pytest $TEST_PATTERN \
                 -v \
                 --timeout=60 \
                 --tb=short \
                 --junit-xml=junit-integration-${{ matrix.python-version }}-${{ matrix.test-group }}.xml \
                 --cov=aztm \
                 --cov-report=xml:coverage-integration-${{ matrix.python-version }}-${{ matrix.test-group }}.xml \
                 -m "integration" \
                 || true  # Don't fail the job if integration tests fail (for now)
      
      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.python-version }}-${{ matrix.test-group }}
          path: |
            junit-integration-*.xml
            coverage-integration-*.xml
      
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.python-version }}-${{ matrix.test-group }}
          path: |
            /tmp/aztm_test_*/*.log
            tests/regression/logs/*.log

  # Performance regression tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'schedule'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need history for baseline comparison
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-benchmark pytest-timeout
      
      - name: Run performance tests
        run: |
          pytest tests/regression/test_performance.py \
                 tests/performance/ \
                 -v \
                 --timeout=300 \
                 --benchmark-only \
                 --benchmark-json=benchmark_results.json \
                 --benchmark-autosave \
                 -m "performance" \
                 || true
      
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tool: 'pytest'
          output-file-path: benchmark_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # Docker-based full integration test
  docker-integration:
    name: Docker Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Run Docker Compose tests
        run: |
          docker-compose -f docker-compose.yml up -d openfire
          
          # Wait for Openfire
          echo "Waiting for Openfire..."
          timeout 120 bash -c 'until docker-compose exec -T openfire nc -z localhost 5222; do sleep 2; done'
          
          # Run tests in container
          docker-compose run --rm aztm-test \
            pytest tests/regression/ \
                   -v \
                   --timeout=60 \
                   --junit-xml=/tmp/junit-docker.xml \
                   -m "not performance"
      
      - name: Docker cleanup
        if: always()
        run: |
          docker-compose down -v
          docker system prune -f

  # Consolidate results and report
  test-results:
    name: Test Results Summary
    needs: [unit-tests, integration-tests, performance-tests, docker-integration]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results
      
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            test-results/**/junit-*.xml
          check_name: AZTM Test Results
          comment_mode: always
      
      - name: Create test summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count test results
          if [ -d test-results ]; then
            echo "### Test Files Found:" >> $GITHUB_STEP_SUMMARY
            find test-results -name "*.xml" -type f | while read file; do
              echo "- \`$(basename $file)\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No test results found" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check test status
        if: needs.unit-tests.result == 'failure'
        run: |
          echo "Unit tests failed"
          exit 1