name: CI - Continuous Integration

on:
  push:
    branches: [main, develop, elad, Agentic, 'feature/**']
  pull_request:
    branches: [main, develop, Agentic]
  workflow_dispatch:
env:
  PYTHON_VERSION: '3.11'
  AZTM_TEST_TIMEOUT: 300

jobs:
  lint-and-format:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      - name: Check code formatting (black)
        continue-on-error: true
        run: black --check aztm/ tests/ --diff
      - name: Check import sorting (isort)
        continue-on-error: true
        run: isort --check-only aztm/ tests/
      - name: Lint (flake8)
        continue-on-error: true
        run: flake8 aztm/ tests/ --count --max-line-length=127 --extend-ignore=E203,W503 --statistics

  unit-tests:
    name: Unit Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pytest-timeout pytest-cov
      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --timeout=30 \
            --tb=short \
            --junit-xml=junit-unit-${{ matrix.python-version }}.xml \
            --cov=aztm \
            --cov-report=xml:coverage-unit-${{ matrix.python-version }}.xml \
            --cov-report=term
      - name: Privacy redaction check
        env:
          AZTM_PRIVACY_MODE: "1"
          AZTM_INTERNAL_DEBUG: "0"
        run: |
          set -e
          pytest -q tests/unit/test_privacy_redaction.py::test_log_redaction_simple -s 2>&1 | tee privacy_log.txt
          if grep -Ei 'xmpp|slixmpp|jid|openfire|sure\.im' privacy_log.txt; then
            echo 'Privacy leak found in logs';
            exit 1;
          fi
      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-${{ matrix.python-version }}
          path: |
            junit-unit-*.xml
            coverage-unit-*.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-unit-${{ matrix.python-version }}.xml
          flags: unittests
          name: unit-py${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true

  integration-tests:
    name: Integration Tests (E2E)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Check for XMPP credentials
        id: check-creds
        env:
          AZTM_CLIENT_JID: ${{ secrets.AZTM_CLIENT_JID }}
          AZTM_CLIENT_PASSWORD: ${{ secrets.AZTM_CLIENT_PASSWORD }}
        run: |
          if [ -n "$AZTM_CLIENT_JID" ] && [ -n "$AZTM_CLIENT_PASSWORD" ]; then
            echo "has_creds=true" >> $GITHUB_OUTPUT
          else
            echo "has_creds=false" >> $GITHUB_OUTPUT
            echo "::warning::Integration tests skipped - set AZTM_CLIENT_JID/AZTM_CLIENT_PASSWORD (and server equivalents) in repo secrets to enable real E2E"
          fi
      - name: Run E2E tests with real accounts
        if: steps.check-creds.outputs.has_creds == 'true'
        env:
          AZTM_CLIENT_JID: ${{ secrets.AZTM_CLIENT_JID }}
          AZTM_CLIENT_PASSWORD: ${{ secrets.AZTM_CLIENT_PASSWORD }}
          AZTM_SERVER_JID: ${{ secrets.AZTM_SERVER_JID }}
          AZTM_SERVER_PASSWORD: ${{ secrets.AZTM_SERVER_PASSWORD }}
        run: |
          pytest tests/regression/ -v --timeout=300 --tb=short \
            --cov=aztm --cov-report=xml:coverage-integration.xml
      - name: Upload integration coverage to Codecov
        if: steps.check-creds.outputs.has_creds == 'true'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage-integration.xml
          flags: integration
          name: integration-tests
          fail_ci_if_error: false
      - name: Note skipped integration
        if: steps.check-creds.outputs.has_creds == 'false'
        run: echo "Integration E2E tests skipped (no XMPP credentials)"

  build-and-package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint-and-format, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Test installation in clean venv
        run: |
          python -m venv venv_test
          . venv_test/bin/activate
          pip install dist/*.whl
          python -c "import aztm; print('AZTM import OK')"
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aztm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true  # Load the image into docker daemon
      - name: Smoke test image
        run: docker run --rm aztm:latest python -c "import aztm; print('AZTM import successful')"

  test-summary:
    name: CI Summary
    needs: [lint-and-format, unit-tests, integration-tests, build-and-package]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summarize results
        run: |
          echo "## CI Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Code Quality | ${{ needs.lint-and-format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Package | ${{ needs.build-and-package.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
