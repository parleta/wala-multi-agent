name: Nightly Regression Tests

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test-scope:
        description: 'Test scope to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - performance
          - security

jobs:
  full-test-suite:
    name: Full Regression Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      
      - name: Run unit tests with coverage
        if: inputs.test-scope == 'all' || inputs.test-scope == 'unit'
        run: |
          pytest tests/unit/ -v --cov=aztm --cov-report=xml --cov-report=html --cov-report=term
      
      - name: Run integration tests
        if: (inputs.test-scope == 'all' || inputs.test-scope == 'integration') && (secrets.AZTM_CLIENT_JID != '' && secrets.AZTM_CLIENT_PASSWORD != '')
        env:
          AZTM_CLIENT_JID: ${{ secrets.AZTM_CLIENT_JID }}
          AZTM_CLIENT_PASSWORD: ${{ secrets.AZTM_CLIENT_PASSWORD }}
          AZTM_SERVER_JID: ${{ secrets.AZTM_SERVER_JID }}
          AZTM_SERVER_PASSWORD: ${{ secrets.AZTM_SERVER_PASSWORD }}
        run: |
          pytest tests/regression/ -v --timeout=300 --tb=short
      
      - name: Run performance tests
        if: inputs.test-scope == 'all' || inputs.test-scope == 'performance'
        run: |
          pytest tests/regression/test_performance.py -v --benchmark-only --benchmark-autosave
      
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
      
      - name: Upload performance results
        if: inputs.test-scope == 'all' || inputs.test-scope == 'performance'
        uses: actions/upload-artifact@v4
        with:
          name: performance-${{ matrix.python-version }}
          path: .benchmarks/

  memory-leak-test:
    name: Memory Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install memory-profiler pympler
      
      - name: Run memory leak tests
        run: |
          python -m pytest tests/regression/test_memory_leaks.py -v --tb=short || true

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit
          pip install -e .
      
      - name: Run Bandit security scan
        run: |
          bandit -r aztm/ -f json -o bandit-report.json || true
      
      - name: Run Safety vulnerability scan
        run: |
          safety check --json > safety-report.json || true
      
      - name: Run pip-audit
        run: |
          pip-audit --desc > pip-audit-report.txt || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            pip-audit-report.txt

  stress-test:
    name: Stress Testing
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: inputs.test-scope == 'all' || inputs.test-scope == 'performance'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install locust
      
      - name: Run stress tests
        if: secrets.AZTM_CLIENT_JID != '' && secrets.AZTM_CLIENT_PASSWORD != ''
        env:
          AZTM_CLIENT_JID: ${{ secrets.AZTM_CLIENT_JID }}
          AZTM_CLIENT_PASSWORD: ${{ secrets.AZTM_CLIENT_PASSWORD }}
          AZTM_SERVER_JID: ${{ secrets.AZTM_SERVER_JID }}
          AZTM_SERVER_PASSWORD: ${{ secrets.AZTM_SERVER_PASSWORD }}
        run: |
          # Create a simple stress test script
          cat > stress_test.py << 'EOF'
          import time
          from aztm import login
          import requests
          from concurrent.futures import ThreadPoolExecutor
          
          login(userid="${AZTM_CLIENT_JID}", password="${AZTM_CLIENT_PASSWORD}")
          
          def make_request(i):
              try:
                  response = requests.get(f"https://{AZTM_SERVER_JID.split('@')[0]}/test/{i}")
                  return response.status_code
              except:
                  return -1
          
          with ThreadPoolExecutor(max_workers=50) as executor:
              start = time.time()
              results = list(executor.map(make_request, range(1000)))
              duration = time.time() - start
              
          success = sum(1 for r in results if r == 200)
          print(f"Completed 1000 requests in {duration:.2f}s")
          print(f"Success rate: {success/10:.1f}%")
          EOF
          
          python stress_test.py || true

  report-summary:
    name: Generate Test Report
    needs: [full-test-suite, memory-leak-test, security-scan, stress-test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Generate summary report
        run: |
          echo "# Nightly Regression Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check coverage files
          if ls coverage-*/coverage.xml 1> /dev/null 2>&1; then
              echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
              for file in coverage-*/coverage.xml; do
                  python_version=$(echo $file | grep -oP 'coverage-\K[^/]+')
                  echo "- Python $python_version: Coverage report generated" >> $GITHUB_STEP_SUMMARY
              done
              echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check performance results
          if ls performance-*/.benchmarks/* 1> /dev/null 2>&1; then
              echo "### Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
              echo "Performance benchmarks completed and saved" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check security reports
          if ls security-reports/* 1> /dev/null 2>&1; then
              echo "### Security Scan" >> $GITHUB_STEP_SUMMARY
              echo "Security scans completed. Check artifacts for detailed reports." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "⚠️ Nightly regression tests failed! Check the logs for details." >> $GITHUB_STEP_SUMMARY